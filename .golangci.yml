version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - bodyclose
    - contextcheck
    - errorlint

  settings:
    errcheck:
      # A CLI writes to stdout/stderr via fmt.Fprint*; a failed terminal write is
      # not actionable, and the codebase never checks these returns. Exclude the
      # family rather than blank-assign ~40 call sites across the tree.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: var-naming

  exclusions:
    rules:
      # test files are allowed more latitude
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
