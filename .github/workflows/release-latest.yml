name: Release latest

# Publishes a rolling `latest` build of the korai binary on every push to main
# that touches Go sources, so deployments that fetch the binary at runtime (the
# Vercel Sandbox image — KORAI_BINARY_URL) always have a current asset at a
# stable URL without a manual tag. For reproducible/pinned production use, point
# KORAI_BINARY_URL at a versioned `v*` release asset (see release.yml) instead.
on:
  push:
    branches: ["main"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/release-latest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-publish:
    name: build & publish latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build linux binaries
        env:
          CGO_ENABLED: "0"
        run: |
          sha="${GITHUB_SHA::7}"
          for arch in amd64 arm64; do
            out="korai-linux-${arch}"
            GOOS=linux GOARCH="${arch}" go build -trimpath \
              -ldflags "-s -w -X main.version=latest-${sha}" \
              -o "${out}" ./cmd/korai
            sha256sum "${out}" > "${out}.sha256"
          done

      - name: Publish rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          prerelease: true
          # Move the `latest` tag/release to this commit and overwrite assets.
          files: |
            korai-linux-amd64
            korai-linux-amd64.sha256
            korai-linux-arm64
            korai-linux-arm64.sha256
          fail_on_unmatched_files: true
          body: |
            Rolling build of `main` (`${{ github.sha }}`). Not a stable release —
            for pinned production use a `v*` tag. Consumed by the Kode web
            backend via `KORAI_BINARY_URL`.
