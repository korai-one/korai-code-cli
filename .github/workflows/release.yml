name: Release

# Builds the korai binary for Linux (the architecture Vercel Sandbox / any
# Firecracker host runs) and publishes it as a release asset the sandbox image
# fetches at build time. Triggered by a version tag, or manually for a one-off
# build against the current ref.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write # create releases and upload assets

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # Static binary: no libc dependency, so it runs on Amazon Linux 2023
          # (Vercel Sandbox) and any minimal rootfs without a glibc match.
          CGO_ENABLED: "0"
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          out="korai-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags "-s -w -X main.version=${tag}" -o "${out}" ./cmd/korai
          sha256sum "${out}" > "${out}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: korai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            korai-${{ matrix.goos }}-${{ matrix.goarch }}
            korai-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
