name: Release

# Cuts a versioned release of the korai binary. The repo is public, so the
# published asset is downloadable without auth — the Kode web backend points
# KORAI_BINARY_URL at the "latest release" asset:
#   https://github.com/korai-one/korai-code-cli/releases/latest/download/korai-linux-amd64
#
# The binary embeds tree-sitter grammars (cgo), so each target is built on its
# own native runner with a native C compiler — no cross-compilation. One target
# per OS: linux/amd64 (Kode sandbox), darwin/arm64 (Apple Silicon CLI), and
# windows/amd64 (CLI + desktop sidecar).
#
# Triggers:
#   - push to main (Go sources changed): auto-bump the patch version and release.
#   - workflow_dispatch: release an explicit version (e.g. v0.2.0) on demand.
on:
  push:
    branches: ["main"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version tag (e.g. v0.2.0). Blank = auto-bump the patch."
        required: false
        type: string

permissions:
  contents: write

# Serialize releases so two pushes can't race to create the same tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version:
    name: determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full tag history to compute the next version

      - name: Determine version
        id: ver
        run: |
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            next="$input"
          else
            latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            if [ -z "$latest" ]; then
              next="v0.1.0"
            else
              v=${latest#v}
              major=${v%%.*}; rest=${v#*.}; minor=${rest%%.*}; patch=${rest#*.}
              next="v${major}.${minor}.$((patch + 1))"
            fi
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next"

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: version
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: ubuntu-latest, goos: linux, goarch: amd64, ext: "" }
          - { os: macos-latest, goos: darwin, goarch: arm64, ext: "" }
          - { os: windows-latest, goos: windows, goarch: amd64, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        # cgo on, built natively (runner OS/arch == target), so the bundled C
        # tree-sitter grammars compile and link with the platform's own toolchain
        # (gcc on the linux/windows images, clang on macOS) — no cross toolchain.
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          v="${{ needs.version.outputs.version }}"
          out="korai-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${v}" -o "${out}" ./cmd/korai
          go version
          echo "built ${out}"

      - uses: actions/upload-artifact@v4
        with:
          name: korai-${{ matrix.goos }}-${{ matrix.goarch }}
          path: korai-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    name: tag & publish
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true # flatten all artifacts into dist/

      - name: Generate checksums
        run: |
          cd dist
          for f in korai-*; do
            case "$f" in *.sha256) continue;; esac
            sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Creates the tag at this commit (a GITHUB_TOKEN-created tag does not
          # re-trigger this workflow, so there is no loop).
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          make_latest: true # so releases/latest/download/<asset> serves this
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/korai-linux-amd64
            dist/korai-linux-amd64.sha256
            dist/korai-darwin-arm64
            dist/korai-darwin-arm64.sha256
            dist/korai-windows-amd64.exe
            dist/korai-windows-amd64.exe.sha256
