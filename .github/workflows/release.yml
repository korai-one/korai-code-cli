name: Release

# Cuts a versioned release of the korai binary. The repo is public, so the
# published asset is downloadable without auth — the Kode web backend points
# KORAI_BINARY_URL at the "latest release" asset:
#   https://github.com/korai-one/korai-code-cli/releases/latest/download/korai-linux-amd64
#
# Triggers:
#   - push to main (Go sources changed): auto-bump the patch version and release.
#   - workflow_dispatch: release an explicit version (e.g. v0.2.0) on demand.
on:
  push:
    branches: ["main"]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version tag (e.g. v0.2.0). Blank = auto-bump the patch."
        required: false
        type: string

permissions:
  contents: write

# Serialize releases so two pushes can't race to create the same tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: tag & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full tag history to compute the next version

      - name: Determine version
        id: ver
        run: |
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            next="$input"
          else
            latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            if [ -z "$latest" ]; then
              next="v0.1.0"
            else
              v=${latest#v}
              major=${v%%.*}; rest=${v#*.}; minor=${rest%%.*}; patch=${rest#*.}
              next="v${major}.${minor}.$((patch + 1))"
            fi
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build binaries
        # Pure-Go (CGO disabled), so every target cross-compiles from the linux
        # runner with no extra toolchain. Linux feeds the Kode sandbox; darwin
        # and windows cover the CLI and the desktop sidecar.
        env:
          CGO_ENABLED: "0"
        run: |
          v="${{ steps.ver.outputs.version }}"
          build() {
            local goos="$1" goarch="$2" ext="$3"
            local out="korai-${goos}-${goarch}${ext}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath \
              -ldflags "-s -w -X main.version=${v}" -o "${out}" ./cmd/korai
            sha256sum "${out}" > "${out}.sha256"
          }
          build linux   amd64 ""
          build linux   arm64 ""
          build darwin  amd64 ""
          build darwin  arm64 ""
          build windows amd64 .exe
          build windows arm64 .exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Creates the tag at this commit (a GITHUB_TOKEN-created tag does not
          # re-trigger this workflow, so there is no loop).
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          make_latest: true # so releases/latest/download/<asset> serves this
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            korai-linux-amd64
            korai-linux-amd64.sha256
            korai-linux-arm64
            korai-linux-arm64.sha256
            korai-darwin-amd64
            korai-darwin-amd64.sha256
            korai-darwin-arm64
            korai-darwin-arm64.sha256
            korai-windows-amd64.exe
            korai-windows-amd64.exe.sha256
            korai-windows-arm64.exe
            korai-windows-arm64.exe.sha256
